<div class="min-h-screen flex items-center justify-center bg-[#FAF7F4] px-4">

  <!-- Decorative background -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <svg class="absolute top-0 right-0 w-64 opacity-10" viewBox="0 0 200 200" fill="none">
      <path d="M190 5 Q80 90 5 195 Q100 105 190 5Z" fill="#C8956C"/>
    </svg>
    <svg class="absolute bottom-0 left-0 w-64 opacity-10" viewBox="0 0 200 200" fill="none">
      <path d="M5 195 Q115 105 195 5 Q95 95 5 195Z" fill="#D4856A"/>
    </svg>
    <!-- Small leaf top left -->
    <svg class="absolute top-8 left-8 w-32 opacity-20" viewBox="0 0 100 100" fill="none">
      <path d="M10 90 Q30 40 90 10 Q60 50 10 90Z" fill="#C8956C"/>
      <path d="M10 90 Q50 60 90 10" stroke="#B07855" stroke-width="1.5"/>
    </svg>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-[#F0E6DE] px-10 py-12 w-full max-w-md relative text-center">

    <!-- Success illustration -->
    <div class="flex justify-center mb-6">
      <img
        src="/images/success-approval-state.png"
        alt="تم التحقق بنجاح"
        class="w-40 h-40 object-cover rounded-full ring-4 ring-[#EAF3DE]"
      />
    </div>

    <h2 class="text-2xl font-bold text-[#3D2314] mb-3">تم التحقق بنجاح! 🎉</h2>
    <p class="text-sm text-[#8B6355] leading-relaxed mb-8">
      تم تفعيل بريدك الإلكتروني بنجاح.<br>
      يمكنك الآن الاستمتاع بكامل منصة Femora للتعلم والإبداع والكسب من مهاراتك.
    </p>

    <!-- Divider with decorative element -->
    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 h-px bg-[#F0E6DE]"></div>
      <span class="text-[#C8956C] text-xs">✿</span>
      <div class="flex-1 h-px bg-[#F0E6DE]"></div>
    </div>

    <button
      routerLink="/onboarding/interests"
      class="w-full bg-[#C8956C] text-white py-3 rounded-xl font-semibold hover:bg-[#B07855] transition"
    >
      متابعة — لنخصّص تجربتك
    </button>

  </div>
</div>

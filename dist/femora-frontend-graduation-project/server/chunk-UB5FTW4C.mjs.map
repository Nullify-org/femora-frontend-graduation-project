<div class="min-h-screen flex items-center justify-center bg-[#FAF7F4] px-4">

  <!-- Decorative background -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <svg class="absolute top-0 left-0 w-72 opacity-10" viewBox="0 0 200 200" fill="none">
      <path d="M10 10 Q60 80 10 190 Q80 120 190 10Z" fill="#C8956C"/>
    </svg>
    <svg class="absolute bottom-0 right-0 w-72 opacity-10" viewBox="0 0 200 200" fill="none">
      <path d="M190 190 Q140 110 190 10 Q120 80 10 190Z" fill="#D4856A"/>
    </svg>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-[#F0E6DE] px-10 py-12 w-full max-w-lg relative">

    <!-- Illustration area -->
    <div class="flex justify-center mb-6">
      <div class="relative w-40 h-40">
        <!-- Background circle -->
        <div class="w-40 h-40 rounded-full bg-[#FDF0EA] flex items-center justify-center">
          <!-- Craft/skill illustration -->
          <svg class="w-28 h-28" viewBox="0 0 100 100" fill="none">
            <!-- Woman with craft -->
            <circle cx="50" cy="28" r="14" fill="#E8C4A0"/>
            <path d="M28 70c0-12 10-22 22-22s22 10 22 22" fill="#C8956C"/>
            <!-- Hair -->
            <path d="M36 22 Q50 10 64 22 Q64 15 50 12 Q36 15 36 22Z" fill="#3D2314"/>
            <!-- Hijab hint -->
            <ellipse cx="50" cy="35" rx="14" ry="8" fill="#D4856A" opacity="0.5"/>
            <!-- Craft in hands -->
            <ellipse cx="50" cy="75" rx="16" ry="8" fill="#E8C4A0" opacity="0.6"/>
            <!-- Sparkles -->
            <text x="18" y="50" font-size="10" fill="#C8956C">✦</text>
            <text x="72" y="44" font-size="8" fill="#D4856A">✦</text>
            <text x="30" y="82" font-size="6" fill="#E8C4A0">✦</text>
          </svg>
        </div>
        <!-- Stars around -->
        <div class="absolute -top-2 right-4 text-[#C8956C] text-2xl">✦</div>
        <div class="absolute -bottom-2 left-4 text-[#D4856A] text-sm">✦</div>
      </div>
    </div>

    <h2 class="text-3xl font-bold text-[#3D2314] text-center mb-2">
      مرحباً بكِ في Femora! ✨
    </h2>
    <p class="text-sm text-[#8B6355] text-center leading-relaxed mb-8 max-w-sm mx-auto">
      تم إعداد حسابك بنجاح. اكتشفي إمكانياتك الإبداعية واعرفي كيف تحولين مهاراتك إلى دخل حقيقي.
    </p>

    <!-- Feature highlights -->
    <div class="grid grid-cols-1 gap-3 mb-8">
      <div class="flex items-center gap-3 bg-[#FDF7F4] rounded-xl p-3.5 border border-[#F0E6DE]">
        <div class="w-10 h-10 rounded-full bg-[#FDF0EA] flex items-center justify-center shrink-0">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#C8956C" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold text-[#3D2314]">تعلمي بلا حدود</p>
          <p class="text-xs text-[#8B6355]">الوصول إلى آلاف الدورات التدريبية</p>
        </div>
      </div>
      <div class="flex items-center gap-3 bg-[#FDF7F4] rounded-xl p-3.5 border border-[#F0E6DE]">
        <div class="w-10 h-10 rounded-full bg-[#FDF0EA] flex items-center justify-center shrink-0">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#C8956C" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold text-[#3D2314]">بيعي مهاراتك</p>
          <p class="text-xs text-[#8B6355]">أنشئي متجرك وابدئي البيع اليوم</p>
        </div>
      </div>
      <div class="flex items-center gap-3 bg-[#FDF7F4] rounded-xl p-3.5 border border-[#F0E6DE]">
        <div class="w-10 h-10 rounded-full bg-[#FDF0EA] flex items-center justify-center shrink-0">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#C8956C" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4l3 3"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold text-[#3D2314]">مجتمع داعم</p>
          <p class="text-xs text-[#8B6355]">انضمي لآلاف المرأة المصرية</p>
        </div>
      </div>
    </div>

    <button
      routerLink="/dashboard"
      class="w-full bg-[#C8956C] text-white py-3.5 rounded-xl font-semibold hover:bg-[#B07855] transition text-base"
    >
      ابدئي رحلتك الآن 🚀
    </button>

  </div>
</div>

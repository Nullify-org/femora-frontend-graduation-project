@if (auth.isAuthenticated()) {
  @if (open()) {
    <div
      class="fixed bottom-24 left-6 z-[90] w-[min(380px,calc(100vw-2rem))] bg-warm-white rounded-2xl femora-shadow border border-sand/50 flex flex-col overflow-hidden animate-fade-in-up"
      style="height: 420px"
    >
      <div class="bg-primary text-white px-4 py-3 flex items-center justify-between">
        <span class="font-semibold text-sm">المساعد الذكي</span>
        <button type="button" (click)="toggle()" class="hover:opacity-80"><svg lucideX [size]="18"></svg></button>
      </div>

      <div class="flex-1 overflow-y-auto p-4 space-y-3">
        @for (msg of messages(); track $index) {
          <div
            class="max-w-[85%] px-3 py-2 rounded-2xl text-sm animate-fade-in-up"
            [class.ms-auto]="msg.role === 'user'"
            [class.bg-primary]="msg.role === 'user'"
            [class.text-white]="msg.role === 'user'"
            [class.bg-cream]="msg.role !== 'user'"
            [class.text-text-dark]="msg.role !== 'user'"
          >
            {{ msg.content }}
          </div>
        }
        @if (sending()) {
          <div class="flex gap-1 px-3 py-2">
            <span class="typing-dot w-2 h-2 bg-text-light rounded-full"></span>
            <span class="typing-dot w-2 h-2 bg-text-light rounded-full"></span>
            <span class="typing-dot w-2 h-2 bg-text-light rounded-full"></span>
          </div>
        }
      </div>

      <div class="p-3 border-t border-sand/40 flex gap-2">
        <input
          [(ngModel)]="draft"
          (keyup.enter)="send()"
          class="flex-1 border border-sand rounded-xl px-3 py-2 text-sm"
          placeholder="اكتبي رسالتك..."
        />
        <button type="button" (click)="send()" class="bg-primary text-white p-2 rounded-xl hover:bg-primary-dark">
          <svg lucideSend [size]="18"></svg>
        </button>
      </div>
    </div>
  }

  <button
    type="button"
    (click)="toggle()"
    class="fixed bottom-6 left-6 z-[90] w-14 h-14 bg-primary text-white rounded-full flex items-center justify-center femora-shadow-hover animate-pulse-ring hover:scale-105 transition"
    aria-label="AI Chat"
  >
    <svg lucideMessageCircle [size]="26"></svg>
  </button>
}

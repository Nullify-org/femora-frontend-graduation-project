@if (open()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-navy/50 backdrop-blur-sm" (click)="close()"></div>
    <div class="relative bg-white rounded-2xl femora-shadow max-w-lg w-full p-6 z-10">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-navy font-display">{{ title() }}</h3>
        <button type="button" (click)="close()" class="text-terracotta-dark hover:text-navy text-xl">&times;</button>
      </div>
      <ng-content />
    </div>
  </div>
}

<div class="edit-container">
  <h2>Edit Course</h2>
  <form [formGroup]="courseForm" (ngSubmit)="save()">
    <div class="form-group">
      <label>Title</label>
      <input formControlName="title" type="text" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description"></textarea>
    </div>
    <div class="form-group">
      <label>Price</label>
      <input formControlName="price" type="number" />
    </div>
    <div class="form-group">
      <label>Level</label>
      <select formControlName="level">
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </div>
    <div class="form-group">
      <label>Category</label>
      <input formControlName="category" type="text" />
    </div>
    <div class="form-group">
      <label>Language</label>
      <input formControlName="language" type="text" />
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="courseForm.invalid">Save Changes</button>
    </div>
  </form>
</div>

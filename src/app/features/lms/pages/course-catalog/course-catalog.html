<div class="flex min-h-screen bg-stone-50">
  <app-sidebar></app-sidebar>

  <main class="flex-1 p-8">
    <div class="max-w-7xl mx-auto">

      <!-- Header -->
      <div class="mb-8">
        <h1 class="text-4xl font-bold text-stone-800 mb-2">
          اكتشف الدورات
        </h1>

        <p class="text-stone-500">
          تعلم المهارات اليدوية والحرفية من أفضل المدربين
        </p>
      </div>

      <!-- Search -->
      <form
        (ngSubmit)="onSearch()"
        class="bg-white rounded-2xl shadow-sm p-4 mb-8"
      >
        <div class="flex gap-3">
          <input
            type="text"
            [(ngModel)]="search"
            name="search"
            placeholder="ابحث عن دورة..."
            class="flex-1 border border-stone-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-300"
          />

          <button
            type="submit"
            class="bg-orange-500 hover:bg-orange-600 text-white px-6 rounded-xl"
          >
            بحث
          </button>
        </div>
      </form>

      <!-- Courses Grid -->
      @if (isLoading()) {
        <div class="text-center py-20 text-stone-500">جاري تحميل الدورات...</div>
      } @else if (courses().length === 0) {
        <div class="text-center py-20 text-stone-500">لا توجد دورات حالياً</div>
      } @else {
        <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
          @for (course of courses(); track course.id) {
            <app-course-card [course]="course"></app-course-card>
          }
        </div>
      }

      <!-- Pagination -->
      @if (totalPages() > 1) {
        <div class="flex items-center justify-center gap-2 mt-10">
          <button
            (click)="prevPage()"
            [disabled]="pageNumber() === 1"
            class="px-4 py-2 rounded-xl border border-stone-200 text-stone-600 disabled:opacity-40 disabled:cursor-not-allowed hover:bg-stone-100"
          >
            السابق
          </button>

          @for (page of pagesArray; track page) {
            <button
              (click)="goToPage(page)"
              class="w-10 h-10 rounded-xl text-sm font-medium transition"
              [class.bg-orange-500]="page === pageNumber()"
              [class.text-white]="page === pageNumber()"
              [class.text-stone-600]="page !== pageNumber()"
              [class.hover:bg-stone-100]="page !== pageNumber()"
            >
              {{ page }}
            </button>
          }

          <button
            (click)="nextPage()"
            [disabled]="pageNumber() === totalPages()"
            class="px-4 py-2 rounded-xl border border-stone-200 text-stone-600 disabled:opacity-40 disabled:cursor-not-allowed hover:bg-stone-100"
          >
            التالي
          </button>
        </div>
      }
    </div>
  </main>
</div>

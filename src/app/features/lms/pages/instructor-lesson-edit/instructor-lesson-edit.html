<div class="edit-container">
  <h2>Edit Lesson</h2>
  <form [formGroup]="lessonForm" (ngSubmit)="save()">
    <div class="form-group">
      <label>Lesson Title</label>
      <input formControlName="title" type="text" placeholder="Enter lesson title" />
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea formControlName="content" rows="4" placeholder="Enter lesson content"></textarea>
    </div>
    <button type="submit" [disabled]="lessonForm.invalid">Save Changes</button>
  </form>
</div>


<a
  [routerLink]="['/lms/course', course.id]"
  class="group bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 block border border-stone-100"
>
  <!-- Thumbnail -->
  <div
    class="relative h-52 overflow-hidden bg-gradient-to-br from-orange-100 via-orange-200 to-amber-300"
  >
    <img
      *ngIf="course.thumbnailUrl"
      [src]="course.thumbnailUrl"
      [alt]="course.title"
      class="w-full h-full object-cover group-hover:scale-105 transition duration-500"
    />

    <div
      *ngIf="!course.thumbnailUrl"
      class="w-full h-full flex items-center justify-center text-7xl"
    >
      📚
    </div>

    <div
      class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-semibold text-orange-600"
    >
      {{ course.level }}
    </div>
  </div>

  <!-- Content -->
  <div class="p-5">

    <div class="flex items-center justify-between mb-3">
      <span
        class="text-xs font-medium text-stone-500"
      >
        {{ course.category }}
      </span>

      <span
        class="text-xs text-stone-400"
      >
        {{ course.language }}
      </span>
    </div>

    <h3
      class="font-bold text-xl text-stone-800 mb-2 line-clamp-2"
    >
      {{ course.title }}
    </h3>

    <p
      class="text-stone-500 text-sm line-clamp-3 min-h-[60px]"
    >
      {{ course.description }}
    </p>

    <div
      class="flex items-center justify-between mt-5 pt-4 border-t border-stone-100"
    >
      <div>
        <p class="text-xs text-stone-400 mb-1">
          المدرب
        </p>

        <p class="font-medium text-stone-700">
          {{ course.instructorName }}
        </p>
      </div>

      <div class="text-right">
        <p class="text-xs text-stone-400">
          التسجيلات
        </p>

        <p class="font-semibold text-stone-700">
          {{ course.enrollmentsCount }}
        </p>
      </div>
    </div>

    <div
      class="mt-5 flex items-center justify-between"
    >
      <span
        class="text-2xl font-bold text-orange-600"
      >
        {{ course.price }} EGP
      </span>

      <span
        class="text-sm font-medium text-orange-500 group-hover:text-orange-600"
      >
        عرض الدورة →
      </span>
    </div>

  </div>
</a>

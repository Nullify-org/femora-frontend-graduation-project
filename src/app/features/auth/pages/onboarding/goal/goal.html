<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="bg-white shadow-md rounded-2xl p-8 w-full max-w-md">

    <!-- Progress Dots -->
    <div class="flex justify-center gap-2 mb-6">
      <span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
      <span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
      <span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
      <span class="w-2.5 h-2.5 rounded-full bg-pink-600"></span>
    </div>

    <!-- Title -->
    <h2 class="text-xl font-semibold text-gray-800 text-center mb-1">
      What is your main goal?
    </h2>

    <!-- Options List -->
    <div class="space-y-3 my-6">
      <button
        *ngFor="let option of options"
        type="button"
        (click)="select(option.label)"
        [class.border-pink-500]="selected === option.label"
        [class.bg-pink-50]="selected === option.label"
        [class.border-gray-300]="selected !== option.label"
        class="w-full flex items-center gap-3 border rounded-lg px-4 py-3 text-left transition hover:border-pink-400"
      >
        <!-- Radio circle -->
        <span
          class="w-4 h-4 rounded-full border-2 flex items-center justify-center"
          [class.border-pink-600]="selected === option.label"
          [class.border-gray-300]="selected !== option.label"
        >
          <span
            *ngIf="selected === option.label"
            class="w-2 h-2 rounded-full bg-pink-600"
          ></span>
        </span>

        <span
          class="text-sm font-medium"
          [class.text-pink-600]="selected === option.label"
          [class.text-gray-700]="selected !== option.label"
        >
          {{ option.label }}
        </span>
      </button>
    </div>

    <!-- Create Account Button -->
    <button
      routerLink="/verify-email"
      class="w-full bg-pink-600 text-white py-2.5 rounded-lg font-medium hover:bg-pink-700 transition"
    >
      Create Account
    </button>

    <!-- Back Link -->
    <div class="text-center mt-4">
      <a routerLink="/onboarding/interests" class="text-sm text-gray-500 hover:text-pink-600">
        Back
      </a>
    </div>

  </div>
</div>

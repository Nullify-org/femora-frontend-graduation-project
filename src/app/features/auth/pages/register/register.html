<div class="min-h-screen flex bg-cream-light" dir="rtl">

  <!-- Left panel (desktop only) -->
  <div class="hidden lg:flex w-1/2 bg-cream items-center justify-center p-12 relative overflow-hidden">
    <svg viewBox="0 0 200 200" fill="none" class="absolute top-0 left-0 w-64 opacity-20">
      <path d="M5 5 Q80 60 5 200 Q80 130 200 5Z" fill="#C96A3A"/>
    </svg>
    <div class="relative z-10 max-w-sm text-center flex flex-col items-center">
      <img src="/images/logo.jpg" alt="Femora Logo" class="w-20 h-20 rounded-full object-cover mb-4 shadow-md bg-white" />
      <h1 class="text-4xl font-bold text-terracotta font-display tracking-wide">Femora</h1>
      <p class="text-sm text-terracotta-dark mt-2 tracking-widest uppercase">تعلّمي · اصنعي · بيعي</p>
      <h2 class="text-xl font-bold text-navy mb-3 mt-10 font-display">ابدئي رحلتك اليوم 🌸</h2>
      <p class="text-sm text-terracotta-dark leading-relaxed">
        انضمي لآلاف السيدات المصريات اللاتي يحوّلن مهاراتهن إلى دخل حقيقي
      </p>
    </div>
  </div>

  <!-- Right panel: form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-6">
    <div class="w-full max-w-md">

      <!-- Mobile logo -->
      <div class="lg:hidden flex flex-col items-center text-center mb-8">
        <img src="/images/logo.jpg" alt="Femora Logo" class="w-16 h-16 rounded-full object-cover mb-2 shadow-sm bg-white" />
        <h1 class="text-3xl font-bold text-terracotta font-display">Femora</h1>
      </div>

      <h2 class="text-2xl font-bold text-navy mb-1 font-display">إنشاء حساب</h2>
      <p class="text-sm text-terracotta-dark mb-7">لنبدأ بمعرفة المزيد عنك</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="space-y-4">

        <!-- Name row -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">الاسم الأول</label>
            <input
              formControlName="firstName"
              type="text"
              placeholder="نور"
              dir="auto"
              class="w-full border border-blush bg-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-terracotta"
              [class.border-red-400]="form.get('firstName')?.invalid && (form.get('firstName')?.touched || submitted())"
            />
            <app-validation-message [control]="form.get('firstName')" [submitted]="submitted()" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy mb-1.5">اسم العائلة</label>
            <input
              formControlName="lastName"
              type="text"
              placeholder="ماهر"
              dir="auto"
              class="w-full border border-blush bg-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-terracotta"
              [class.border-red-400]="form.get('lastName')?.invalid && (form.get('lastName')?.touched || submitted())"
            />
            <app-validation-message [control]="form.get('lastName')" [submitted]="submitted()" />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-navy mb-1.5">البريد الإلكتروني</label>
          <input
            formControlName="email"
            type="email"
            placeholder="nour.maher@example.com"
            dir="auto"
            class="w-full border border-blush bg-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-terracotta"
            [class.border-red-400]="form.get('email')?.invalid && (form.get('email')?.touched || submitted())"
          />
          <app-validation-message [control]="form.get('email')" [submitted]="submitted()" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-navy mb-1.5">كلمة المرور</label>
          <div class="relative">
            <input
              formControlName="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              class="w-full border border-blush bg-white rounded-xl px-4 py-3 pl-11 text-sm focus:outline-none focus:ring-2 focus:ring-terracotta"
              [class.border-red-400]="form.get('password')?.invalid && (form.get('password')?.touched || submitted())"
            />
            <button type="button" (click)="togglePassword()" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-terracotta-dark">
              👁
            </button>
          </div>
          <app-password-strength [password]="passwordValue" />
          <app-validation-message [control]="form.get('password')" [submitted]="submitted()" />
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-semibold text-navy mb-1.5">تأكيد كلمة المرور</label>
          <div class="relative">
            <input
              formControlName="confirmPassword"
              [type]="showConfirm() ? 'text' : 'password'"
              placeholder="••••••••"
              class="w-full border border-blush bg-white rounded-xl px-4 py-3 pl-11 text-sm focus:outline-none focus:ring-2 focus:ring-terracotta"
              [class.border-red-400]="(form.get('confirmPassword')?.invalid || form.hasError('passwordMismatch')) && (form.get('confirmPassword')?.touched || submitted())"
            />
            <button type="button" (click)="toggleConfirm()" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-terracotta-dark">
              👁
            </button>
          </div>
          <app-validation-message [control]="form.get('confirmPassword')" [submitted]="submitted()" />
        </div>

        <!-- API Error -->
        @if (apiError()) {
          <div class="flex items-start gap-3 bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700">
            <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
            </svg>
            <span>
              {{ apiError() }}
              @if (apiError()!.includes('مسجّل بالفعل')) {
                <a routerLink="/login" class="font-semibold underline mr-1 hover:text-red-900">تسجيل الدخول</a>
              }
            </span>
          </div>
        }

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full bg-terracotta text-white py-3.5 rounded-xl font-semibold hover:bg-terracotta-dark transition disabled:opacity-60 flex items-center justify-center gap-2"
        >
          @if (isLoading()) {
            <span class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span>
            جارٍ إنشاء الحساب...
          } @else {
            إنشاء حساب
          }
        </button>

      </form>

      <p class="text-center text-sm text-terracotta-dark mt-6">
        لديكِ حساب؟
        <a routerLink="/login" class="font-semibold text-terracotta hover:underline mr-1">تسجيل الدخول</a>
      </p>

    </div>
  </div>
</div>
